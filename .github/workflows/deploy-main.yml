name: Build and deploy

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}

jobs:
  build-deploy-main:
    environment: jorib-backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'pnpm'
          cache-dependency-path: joribhaejo-next/pnpm-lock.yaml # 수정된 부분

      - name: Install dependencies (Next.js)
        working-directory: ./joribhaejo-next
        run: pnpm install

      - name: Build Next.js
        working-directory: ./joribhaejo-next
        run: pnpm build

      - name: Copy Next.js build files to Spring Boot static resources
        run: |
          rm -rf ./joribhaejo-spring/src/main/resources/static/*
          cp -r ./joribhaejo-next/out ./joribhaejo-spring/src/main/resources/static/ # .next/static 대신 out 디렉토리 사용 (아래 추가 설명 참조)

      - name: Grant execute permission for gradlew
        working-directory: ./joribhaejo-spring
        run: chmod +x ./gradlew

      - name: Build Spring Boot JAR
        working-directory: ./joribhaejo-spring
        run: ./gradlew bootJar

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        working-directory: ./joribhaejo-spring
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.WORK_DIRECTORY }}
            
            echo "DB_HOST=${{ secrets.DB_HOST }}" > .env
            echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" >> .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "JWT_ACCESS_EXP=${{ secrets.JWT_ACCESS_EXP }}" >> .env
            echo "JWT_REFRESH_EXP=${{ secrets.JWT_REFRESH_EXP }}" >> .env
            echo "IMAGE_NAME=${{ secrets.IMAGE_NAME }}" >> .env
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
            
            sudo docker compose pull
            sudo docker compose up -d